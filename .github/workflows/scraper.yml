name: TecSystem Brasil - Atualizar Vagas

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 13 * * *'
    - cron: '0 17 * * *'
    - cron: '0 21 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install requests beautifulsoup4 googlesearch-python

      - name: Rodar o robô
        run: python scraper.py

      - name: Salvar site atualizado
        run: |
          git config user.name "TecSystem Bot"
          git config user.email "bot@tecsystem.com"
          git pull --rebase
          git add index.html vagas_cache.json
          git diff --staged --quiet || git commit -m "🤖 Vagas atualizadas $(date +'%d/%m/%Y %H:%M')"
          git push
