name: TecSystem Brasil - Atualizar Vagas

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 13 * * *'
    - cron: '0 17 * * *'
    - cron: '0 21 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 googlesearch-python

      - name: Rodar o robô
        run: python scraper.py

      - name: Salvar site atualizado
        run: |
          git config user.name "TecSystem Bot"
          git config user.email "bot@tecsystem.com"
          git fetch origin main
          git reset --hard origin/main
          git add index.html vagas_cache.json
          git diff --staged --quiet || git commit -m "🤖 Vagas atualizadas $(date +'%d/%m/%Y %H:%M')"
          git push origin main
